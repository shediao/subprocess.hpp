name: CMake on BSD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # FreeBSD build
  # ─────────────────────────────────────────────────────────────────────────
  freebsd-build:
    runs-on: ubuntu-latest
    name: FreeBSD Build
    steps:
      - uses: actions/checkout@v5

      - name: build on FreeBSD vm
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y cmake git bash
          run: |
            cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DSUBPROCESS_BUILD_TESTS=ON
            cmake --build build
            ctest --test-dir build --output-on-failure

  # ─────────────────────────────────────────────────────────────────────────
  # OpenBSD build
  # ─────────────────────────────────────────────────────────────────────────
  openbsd-build:
    runs-on: ubuntu-latest
    name: OpenBSD Build
    steps:
      - uses: actions/checkout@v5

      - name: build on OpenBSD vm
        uses: vmactions/openbsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg_add cmake git bash
          run: |
            cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DSUBPROCESS_BUILD_TESTS=ON
            cmake --build build
            ctest --test-dir build --output-on-failure
